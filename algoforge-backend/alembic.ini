# alembic.ini — Alembic configuration file for AlgoForge

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Maximum length of the truncated slug
truncate_slug_length = 40

# The SQLAlchemy connection URL is set programmatically in alembic/env.py
# from the DATABASE_URL environment variable, so sqlalchemy.url is not
# needed here — but Alembic requires the key to exist.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# leave empty — no post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
